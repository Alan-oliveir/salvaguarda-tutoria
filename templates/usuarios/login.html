{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Salvaguarda</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="login-body">

    <div class="login-wrapper">
        <!-- Lado esquerdo com imagem de fundo e chamada -->
        <div class="login-left">
            <div class="login-overlay">
                <img src="{% static 'img/logo.png' %}" alt="Logo Salvaguarda" class="logo-sg">
                <h1>Bem-vindo(a)</h1>
                <p>Conecte-se e acompanhe sua jornada no maior programa social do Brasil.</p>
            </div>
        </div>

        <!-- Lado direito com o formulário -->
        <div class="login-right">
            <div class="login-form">
                <h2>Acessar conta</h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        {{ form.username.label_tag }}
                        {{ form.username }}
                    </div>
                    <div class="form-group">
                        {{ form.password.label_tag }}
                        {{ form.password }}
                    </div>
                    <button type="submit">Entrar</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
